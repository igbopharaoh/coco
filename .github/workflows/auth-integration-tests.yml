name: auth-integration-tests

on:
  pull_request:
    paths:
      - 'packages/core/**'
      - 'packages/adapter-tests/**'
      - 'scripts/auth_mint/**'
      - '.github/workflows/auth-integration-tests.yml'
  workflow_dispatch:

concurrency:
  group: auth-integration-tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  integration-tests:
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.18

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run auth integration tests
        run: bash ./scripts/auth_mint/test-auth-integration.sh
